<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Cart</title>

<style>
body{
    font-family: Arial, sans-serif;
    background-color: #f3f3f3;
    text-align: center;
}

.cart-container{
    width: 80%;
    max-width: 600px;
    margin: 50px auto;
    background: white;
    padding: 20px;
    border-radius: 8px;
}

button{
    background-color: #febd69;
    border: none;
    padding: 12px 20px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 16px;
}

button:hover{
    background-color: #f3a847;
}
</style>
</head>
<body>

<div class="cart-container">
    <h1>Your Cart</h1>

    <p>Your cart is currently empty.</p>

    <button onclick="window.location.href='index.html'">
        Continue Shopping
    </button>
</div>

</body>
</html>
